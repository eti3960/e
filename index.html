<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur e</title>
    <style>
        :root { 
            --grass-green: #3CB371; 
            --bg-page: rgba(0, 0, 0, 0.8);    
            --bg-calc: rgba(0, 0, 0, 0.4);    
            --blue: #00BFFF; 
            --highlight-green: rgba(60, 179, 113, 0.2); 
        }

        body { 
            font-family: 'Fact Expanded', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--bg-page); 
            display: flex; justify-content: center; padding: 5px; color: white; margin: 0;
            min-height: 100vh;
        }

        #calc { 
            background-color: var(--bg-calc); 
            padding: 5px 25px 50px 25px; 
            border-radius: 12px; 
            width: 100%; max-width: 480px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: white; 
            position: relative;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1.logo { 
            text-align: center; 
            margin: 5px 0 10px 0; 
            color: var(--grass-green); font-weight: 900; 
            font-size: 4em; line-height: 1;
        }

        .row-inputs {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 5px;
        }
        .input-group { flex: 1; }
        .separator {
            padding-bottom: 15px;
            font-weight: bold;
            color: #f0f0f0;
        }

        label { display: block; margin: 12px 0 3px; font-size: 0.85em; font-weight: bold; color: #f0f0f0; }
        
        input, select { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; 
            background: #ffffff; color: #333333; font-size: 16px; box-sizing: border-box; 
            margin-bottom: 5px; 
            font-family: 'Fact Expanded', sans-serif;
        }

        .paliers-table { 
            width: 100%; margin-top: 25px; border-collapse: collapse; 
            font-size: 0.9em; background: #ffffff; border-radius: 8px; 
            overflow: hidden; color: #333333; 
        }
        
        .paliers-table th { 
            background: #f0f0f0; color: #000000; 
            padding: 12px; text-align: left; border-bottom: 2px solid #ddd; 
        }
        
        .paliers-table td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        
        .row-highlight { background-color: var(--highlight-green) !important; }

        .info { font-size: 0.85em; color: #d0d0d0; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; margin-top: 15px; line-height: 1.6; }
        .highlight { color: #ffffff; font-weight: bold; }

        .signature {
            position: absolute; bottom: 15px; right: 20px;
            font-size: 0.7em; color: #888; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="calc">
    <h1 class="logo">e</h1>

    <div class="row-inputs">
        <div class="input-group">
            <label>Largeur mm (L)</label>
            <input type="number" id="largeur" placeholder="0" oninput="calculer()">
        </div>
        <div class="separator">x</div>
        <div class="input-group">
            <label>Hauteur mm (A)</label>
            <input type="number" id="hauteur" placeholder="0" oninput="calculer()">
        </div>
    </div>

    <label>Type d'impression</label>
    <select id="impression" onchange="calculer()">
        <option value="0.80">Noir</option>
        <option value="1.0">CMYK</option>
        <option value="1.45">CMYK + blanc couvrant</option>
        <option value="0.50">Sans impression (neutre)</option>
    </select>

    <label>Type de Papier (330)</label>
    <select id="matiere" onchange="calculer()">
        <option value="0.40">Papier couché</option>
        <option value="0.45">Papier non couché</option>
        <option value="1.10">Papier Or / Argent</option>
        <option value="0.70">PP Transparent</option>
        <option value="0.65">PP Blanc</option>
        <option value="0.85">PE Transparent</option>
    </select>

    <label>Type d'Ennoblissement</label>
    <select id="ennoblissement" onchange="calculer()">
        <option value="0">Aucun</option>
        <option value="0">Flexo sélectif (60.-)</option>
        <option value="0">Dorure (160 Fr.)</option>
        <option value="0">Foulage (160.-)</option>
        <option value="0">Dorure galbée (350.-)</option>
        <option value="0">Gaufrage (350.-)</option>
    </select>

    <div class="row-inputs">
        <div class="input-group">
            <label>Nb de sortes</label>
            <select id="sortes" onchange="calculer()">
                </select>
        </div>
        <div class="input-group">
            <label>Quantité</label>
            <input type="number" id="quantite" placeholder="0" oninput="calculer()">
        </div>
    </div>

    <table class="paliers-table">
        <thead>
            <tr>
                <th>Qté</th>
                <th>Total HT</th>
                <th>/1000</th>
            </tr>
        </thead>
        <tbody id="paliersBody"></tbody>
    </table>

    <div class="info" id="stats">Saisissez les données...</div>

    <div class="signature" id="dateSignature">DA / --</div>
</div>

<script>
window.onload = function() {
    document.getElementById("largeur").value = "";
    document.getElementById("hauteur").value = "";
    document.getElementById("quantite").value = "";
    calculer();
};

const selSortes = document.getElementById('sortes');
for (let i = 1; i <= 30; i++) {
    let opt = document.createElement('option');
    opt.value = i;
    opt.innerHTML = i;
    selSortes.appendChild(opt);
}

const d = new Date();
const dateStr = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth()+1).toString().padStart(2, '0') + '.' + d.getFullYear();
document.getElementById('dateSignature').innerHTML = "DA / " + dateStr;

function moteurCalcul(l, h, q, mat, imp, sortes) {
    const LAIZE = 330;
    const GAP = 4;
    const MARGE_HP = 10;
    let posesLaize = Math.floor((LAIZE - MARGE_HP) / (l + GAP));
    if (posesLaize < 1) posesLaize = 1;
    let nbRangs = Math.ceil(q / posesLaize);
    let ml = (nbRangs * (h + GAP)) / 1000;
    let surfaceM2 = ml * 0.33;
    let prixProd = surfaceM2 * mat * imp * 115;
    let fraisSortes = (sortes - 1) * 35; 
    let coeff = 1.0;
    if (q >= 100000) coeff = 0.50;
    else if (q >= 50000) coeff = 0.65;
    else if (q >= 10000) coeff = 0.80;
    let total = (prixProd * coeff) + 120 + fraisSortes;
    if (total < 150) total = 150;
    let pam = (total / q) * 1000;
    return { total, pam, posesLaize, ml };
}

function calculer() {
    let l = parseFloat(document.getElementById("largeur").value) || 0;
    let h = parseFloat(document.getElementById("hauteur").value) || 0;
    let qBase = parseFloat(document.getElementById("quantite").value) || 0;
    let sortes = parseInt(document.getElementById("sortes").value);
    let mat = parseFloat(document.getElementById("matiere").value);
    let imp = parseFloat(document.getElementById("impression").value);
    let body = document.getElementById("paliersBody");
    let stats = document.getElementById("stats");

    if (l > 0 && h > 0 && qBase > 0) {
        let diffs = [-500, 0, 500, 1000, 2000, 5000, 10000];
        let htmlPaliers = "";
        let mainRes = null;
        diffs.forEach(diff => {
            let qVariant = qBase + diff;
            if (qVariant > 0) {
                let res = moteurCalcul(l, h, qVariant, mat, imp, sortes);
                if (diff === 0) mainRes = res;
                let highlightClass = (diff === 0) ? 'row-highlight' : '';
                htmlPaliers += `<tr class="${highlightClass}">
                    <td style="font-weight:bold;">${qVariant}</td>
                    <td style="color:var(--grass-green); font-weight:bold;">${res.total.toFixed(2)} CHF</td>
                    <td style="color:var(--blue);">${res.pam.toFixed(2)}</td>
                </tr>`;
            }
        });
        body.innerHTML = htmlPaliers;
        if (mainRes) {
            stats.innerHTML = `Poses : <span class='highlight'>${mainRes.posesLaize}</span> | Métrage : <span class='highlight'>${mainRes.ml.toFixed(2)} m</span>`;
        }
    } else {
        body.innerHTML = "";
        stats.innerHTML = "Saisissez les données...";
    }
}
</script>
</body>
</html>
