<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP</title>
    <style>
        :root { --accent: #00ff88; --text: #ffffff; }
        body { 
            font-family: sans-serif; 
            background-color: #808080; /* Gris 50% */
            display: flex; justify-content: center; padding: 20px; color: var(--text);
        }
        #calc { 
            background: #333; padding: 25px; border-radius: 15px; 
            width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-top: 0; color: var(--accent); }
        label { display: block; margin: 12px 0 5px; font-size: 0.9em; font-weight: bold; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #444; color: white; font-size: 16px; box-sizing: border-box; 
        }
        .res-box { 
            background: #222; padding: 15px; border-radius: 10px; 
            margin-top: 20px; border-left: 5px solid var(--accent); 
        }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .val { font-weight: bold; color: var(--accent); font-size: 1.2em; }
        .info { font-size: 0.85em; color: #bbb; border-top: 1px solid #444; pt: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="calc">
    <h2>HP</h2>

    <label>Largeur (mm)</label>
    <input type="number" id="largeur" value="50" oninput="calculer()">

    <label>Hauteur (mm)</label>
    <input type="number" id="hauteur" value="50" oninput="calculer()">

    <label>Quantité</label>
    <input type="number" id="quantite" value="1000" oninput="calculer()">

    <label>Matière (Laize 330 fixe)</label>
    <select id="matiere" onchange="calculer()">
        <option value="0.45">Papier blanc</option>
        <option value="0.65">Papier structuré</option>
        <option value="0.90">Papier premium vin</option>
        <option value="0.75">Polypropylène blanc</option>
    </select>

    <label>Ennoblissement (Ne s'ajoute pas au total)</label>
    <select id="ennoblissement">
        <option value="0">Aucun</option>
        <option value="160">Dorure à chaud (160 CHF)</option>
        <option value="60">Vernis sélectif (60 CHF)</option>
        <option value="350">Galbe (350 CHF)</option>
    </select>

    <div class="res-box">
        <div class="res-row">
            <span>Prix Total :</span>
            <span class="val" id="total">-- CHF</span>
        </div>
        <div class="res-row">
            <span>Prix au mille :</span>
            <span class="val" id="pam" style="color: #00d4ff;">-- CHF</span>
        </div>
        <div class="info" id="stats">
            Poses : --
        </div>
    </div>
</div>

<script>
function calculer() {
    let largeur = parseFloat(document.getElementById("largeur").value) || 0;
    let hauteur = parseFloat(document.getElementById("hauteur").value) || 0;
    let quantite = parseFloat(document.getElementById("quantite").value) || 0;
    let matiere = parseFloat(document.getElementById("matiere").value);

    if (largeur > 0 && hauteur > 0 && quantite > 0) {
        const LAIZE = 330;
        const INTERCAL = 3; // Espace entre étiquettes

        // Calcul des poses
        let posesLaize = Math.floor((LAIZE - 10) / (largeur + INTERCAL)); // -10mm de bordure sécurité
        if (posesLaize < 1) posesLaize = 1;

        let avanceH = hauteur + INTERCAL;
        let nbPas = Math.ceil(quantite / posesLaize);
        let ml = (nbPas * avanceH) / 1000;

        // Calcul prix basé sur consommation laize réelle (330mm)
        let surfaceM2 = ml * 0.33;
        let prixBase = surfaceM2 * quantite * matiere; 

        // Dégressivité Indigo
        let coeff = 1.0;
        if (quantite >= 50000) coeff = 0.6;
        else if (quantite >= 10000) coeff = 0.75;
        else if (quantite >= 5000) coeff = 0.85;

        let total = (prixBase * coeff * 0.05) + 120; // Ajustement Indigo + Frais fixes
        if (total < 150) total = 150;

        let pam = (total / quantite) * 1000;

        // Affichage
        document.getElementById("total").innerText = total.toFixed(2) + " CHF";
        document.getElementById("pam").innerText = pam.toFixed(2) + " CHF";
        document.getElementById("stats").innerHTML = 
            "Poses en laize : <b>" + posesFront + "</b><br>" +
            "Métrage linéaire : <b>" + ml.toFixed(1) + " m</b>";
    }
}

// Note : Le menu déroulant d'ennoblissement est purement indicatif 
// selon votre demande (ne modifie pas le prix total).
calculer();
</script>

</body>
</html>
