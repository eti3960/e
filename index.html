<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur e</title>
    <style>
        :root { 
            --grass-green: #3CB371; 
            --mid-gray: #808080; 
            --blue: #00BFFF; 
            --highlight-green: rgba(60, 179, 113, 0.2); 
        }

        body { 
            font-family: 'Fact Expanded', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #ffffff; 
            display: flex; justify-content: center; padding: 20px; color: #333333; margin: 0;
        }

        #calc { 
            background-color: var(--mid-gray); 
            padding: 25px; border-radius: 12px; 
            width: 100%; max-width: 480px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white; 
            position: relative;
            padding-bottom: 50px;
        }

        h1.logo { 
            text-align: center; 
            margin: 0 0 10px 0; 
            color: var(--grass-green); 
            font-weight: 900; 
            font-size: 4em;
            line-height: 1;
        }

        label { display: block; margin: 12px 0 3px; font-size: 0.85em; font-weight: bold; color: #f0f0f0; }
        
        input, select { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; 
            background: #ffffff; color: #333333; font-size: 16px; box-sizing: border-box; 
            margin-bottom: 5px; 
            font-family: 'Fact Expanded', sans-serif;
        }

        .paliers-table { 
            width: 100%; margin-top: 25px; border-collapse: collapse; 
            font-size: 0.9em; background: #ffffff; border-radius: 8px; 
            overflow: hidden; color: #333333; 
        }
        .paliers-table th { background: #f0f0f0; color: var(--blue); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        .paliers-table td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        
        .row-highlight { 
            background-color: var(--highlight-green) !important; 
        }

        .info { font-size: 0.85em; color: #e0e0e0; border-top: 1px solid #999; padding-top: 10px; margin-top: 15px; line-height: 1.6; }
        .highlight { color: #ffffff; font-weight: bold; }

        .signature {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 0.7em;
            color: #d0d0d0;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="calc">
    <h1 class="logo">e</h1>

    <label>Largeur Étiquette mm (laize)</label>
    <input type="number" id="largeur" value="50" oninput="calculer()">

    <label>Hauteur Étiquette mm (avance)</label>
    <input type="number" id="hauteur" value="50" oninput="calculer()">

    <label>Type d'impression</label>
    <select id="impression" onchange="calculer()">
        <option value="0.80">Noir</option>
        <option value="1.0">CMYK</option>
        <option value="1.45">CMYK + blanc couvrant</option>
        <option value="0.50">Sans impression (neutre)</option>
    </select>

    <label>Type de Papier (Laize 330)</label>
    <select id="matiere" onchange="calculer()">
        <option value="0.40">Papier couché</option>
        <option value="0.45">Papier non couché</option>
        <option value="1.10">Papier Or / Argent</option>
        <option value="0.70">PP Transparent</option>
        <option value="0.65">PP Blanc</option>
        <option value="0.85">PE Transparent</option>
    </select>

    <label>Type d'Ennoblissement</label>
    <select id="ennoblissement" onchange="calculer()">
        <option value="0">Aucun</option>
        <option value="160">Dorure (160 Fr.)</option>
        <option value="350">Dorure galbée (350.-)</option>
        <option value="60">Flexo sélectif (60.-)</option>
    </select>

    <label>Nombre de sortes (versions)</label>
    <select id="sortes" onchange="calculer()">
        </select>

    <label>Quantité demandée</label>
    <input type="number" id="quantite" value="1000" oninput="calculer()">

    <table class="paliers-table">
        <thead>
            <tr>
                <th>Qté</th>
                <th>Total HT</th>
                <th>PAM</th>
            </tr>
        </thead>
        <tbody id="paliersBody"></tbody>
    </table>

    <div class="info" id="stats">Saisissez les données...</div>

    <div class="signature" id="dateSignature">DA / --</div>
</div>

<script>
const selSortes = document.getElementById('sortes');
for (let i = 1; i <= 30; i++) {
    let opt = document.createElement('option');
    opt.value = i;
    opt.innerHTML = i;
    selSortes.appendChild(opt);
}

const d = new Date();
const dateStr = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth()+1).toString().padStart(2, '0') + '.' + d.getFullYear();
document.getElementById('dateSignature').innerHTML = "DA / " + dateStr;

function moteurCalcul(l, h, q, mat, imp, sortes, ennobValue) {
    const LAIZE = 330;
    const GAP = 4;
    const MARGE_HP = 10;

    let posesLaize = Math.floor((LAIZE - MARGE_HP) / (l + GAP));
    if (posesLaize < 1) posesLaize = 1;

    let nbRangs = Math.ceil(q / posesLaize);
    let ml = (nbRangs * (h + GAP)) / 1000;

    let surfaceM2 = ml * 0.33;
    let prixProd = surfaceM2 * mat * imp * 115;

    let fraisSortes = (sortes - 1) * 35; 
    let fraisEnnob = parseFloat(ennobValue);
    let extraMatiereEnnob = fraisEnnob > 0 ? ml * 0.45 : 0;

    let coeff = 1.0;
    if (q >= 100000) coeff = 0.50;
    else if (q >= 50000) coeff = 0.65;
    else if (q >= 10000) coeff = 0.80;

    let total = (prixProd * coeff) + 120 + fraisSortes + fraisEnnob + extraMatiereEnnob;
    if (total < 150) total = 150;
    let pam = (total / q) * 1000;
    
    return { total, pam, posesLaize, ml };
}

function calculer() {
    let l = parseFloat(document.getElementById("largeur").value) || 0;
    let h = parseFloat(document.getElementById("hauteur").value) || 0;
    let qBase = parseFloat(document.getElementById("quantite").value) || 0;
    let sortes = parseInt(document.getElementById("sortes").value);
    let mat = parseFloat(document.getElementById("matiere").value);
    let imp = parseFloat(document.getElementById("impression").value);
    let ennob = document.getElementById("ennoblissement").value;

    if (l > 0 && h > 0 && qBase > 0) {
        let diffs = [-500, 0, 500, 1000, 2000, 5000, 10000];
        let htmlPaliers = "";
        let mainRes = null;

        diffs.forEach(diff => {
            let qVariant = qBase + diff;
            if (qVariant > 0) {
                let res = moteurCalcul(l, h, qVariant, mat, imp, sortes, ennob);
                if (diff === 0) mainRes = res;
                let highlightClass = (diff === 0) ? 'row-highlight' : '';

                htmlPaliers += `<tr class="${highlightClass}">
                    <td style="font-weight:bold;">${qVariant}</td>
                    <td style="color:var(--grass-green); font-weight:bold;">${res.total.toFixed(2)} CHF</td>
                    <td style="color:var(--blue);">${res.pam.toFixed(2)}</td>
                </tr>`;
            }
        });

        document.getElementById("paliersBody").innerHTML = htmlPaliers;
        
        if (mainRes) {
            document.getElementById("stats").innerHTML = 
                "Poses de front : <span class='highlight'>" + mainRes.posesLaize + "</span> | " +
                "Métrage (Réf.) : <span class='highlight'>" + mainRes.ml.toFixed(2) + " m</span>";
        }
    }
}
calculer();
</script>
</body>
</html>
